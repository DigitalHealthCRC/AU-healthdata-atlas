<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 450" role="img" aria-label="Digital Health CRC">
  <!-- Vector recreation of the DHCRC logo mark, traced from the official icon
       (official raster assets are not shipped with this repo — swap in
       "4__DHCRC_Logo_Colour_ICON_Transparent.png" if available).
       Geometry: smaller left diamond (orange-red -> magenta-pink) whose
       top-right edge extends at 45 deg through the larger right diamond
       (magenta-pink -> purple -> blue), ending in a small magenta diamond
       whose top corner sits on the right diamond's lower-right edge. -->
  <defs>
    <linearGradient id="dhcrc-left" x1="23" y1="185" x2="470" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fd0100"/>
      <stop offset="0.6" stop-color="#fd01de"/>
      <stop offset="1" stop-color="#fd01de"/>
    </linearGradient>
    <linearGradient id="dhcrc-right" x1="267" y1="373" x2="603" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fd01de"/>
      <stop offset="0.5" stop-color="#c200ff"/>
      <stop offset="1" stop-color="#008fff"/>
    </linearGradient>
  </defs>
  <!-- left diamond + extended edge (under the right diamond at the lower crossing) -->
  <path d="M 317 185 L 170 332 L 23 185 L 170 38 L 470 338"
        fill="none" stroke="url(#dhcrc-left)" stroke-width="26"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right diamond -->
  <path d="M 267 205 L 435 37 L 603 205 L 435 373 Z"
        fill="none" stroke="url(#dhcrc-right)" stroke-width="26"
        stroke-linejoin="round"/>
  <!-- re-draw the long stroke over the upper crossing so the ribbons interlock -->
  <path d="M 262 130 L 342 210" fill="none" stroke="url(#dhcrc-left)"
        stroke-width="26" stroke-linecap="round"/>
  <!-- small diamond terminating the line -->
  <path d="M 470 338 L 512 380 L 470 422 L 428 380 Z"
        fill="none" stroke="#fd01de" stroke-width="26" stroke-linejoin="round"/>
</svg>
